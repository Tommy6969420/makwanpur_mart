{% extends "base.html" %}
{% block title %}Change Password — Makwanpur Mart{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto bg-white p-8 rounded-stall border border-neutral-200 shadow-sm my-6 space-y-6">
    <h1 class="font-display font-bold text-2xl text-brand-green border-b pb-4">Update Security Password</h1>
    <form action="{% url 'accounts:profile' %}" method="post" class="space-y-4">
        <div>
            <label class="block text-xs font-bold text-neutral-700 uppercase mb-1">Current Password *</label>
            <input type="password" required class="w-full bg-surface-base border border-neutral-300 rounded-stall px-3 py-2 text-sm">
        </div>
        <div>
            <label class="block text-xs font-bold text-neutral-700 uppercase mb-1">New Password *</label>
            <input type="password" required class="w-full bg-surface-base border border-neutral-300 rounded-stall px-3 py-2 text-sm">
        </div>
        <div>
            <label class="block text-xs font-bold text-neutral-700 uppercase mb-1">Confirm New Password *</label>
            <input type="password" required class="w-full bg-surface-base border border-neutral-300 rounded-stall px-3 py-2 text-sm">
        </div>
        <button type="submit" class="w-full bg-brand-green text-white font-display font-bold py-3 rounded-stall shadow">Update Security Password</button>
    </form>
</div>
{% endblock %}

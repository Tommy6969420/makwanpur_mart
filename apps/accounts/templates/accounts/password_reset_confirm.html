{% extends "base.html" %}
{% block title %}Set New Password — Makwanpur Mart{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-stall border border-neutral-200 shadow-sm my-6 space-y-6">
    <div class="p-3 bg-state-success/10 border border-state-success text-state-success rounded-stall text-xs">
        ✓ Verification OTP confirmed for mobile <strong>+977 9845123456</strong>.
    </div>
    <div>
        <h1 class="font-display font-bold text-2xl text-brand-green">Create New Password</h1>
        <p class="text-xs text-neutral-600 mt-1">Please enter your new secure password below.</p>
    </div>
    <form action="{% url 'accounts:login' %}" method="post" class="space-y-4">
        <div>
            <label class="block text-xs font-bold text-neutral-700 uppercase mb-1">New Password *</label>
            <input type="password" required class="w-full bg-surface-base border border-neutral-300 rounded-stall px-3 py-2 text-sm">
            <div class="mt-2 p-2 bg-surface-base rounded-stall text-[11px] text-neutral-600">
                Minimum 8 chars, 1 numeric digit required.
            </div>
        </div>
        <div>
            <label class="block text-xs font-bold text-neutral-700 uppercase mb-1">Confirm New Password *</label>
            <input type="password" required class="w-full bg-surface-base border border-neutral-300 rounded-stall px-3 py-2 text-sm">
        </div>
        <button type="submit" class="w-full bg-brand-green text-white font-display font-bold py-3 rounded-stall hover:brightness-110 transition shadow">
            Save Password &amp; Sign In
        </button>
    </form>
</div>
{% endblock %}

{% extends "base.html" %}
{% block title %}Reset Password — Makwanpur Mart{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-stall border border-neutral-200 shadow-sm my-6 space-y-6">
    <div>
        <h1 class="font-display font-bold text-2xl text-brand-green">Reset Account Password</h1>
        <p class="text-xs text-neutral-600 mt-1">Enter your registered mobile phone number. We will send an OTP code to confirm your identity.</p>
    </div>
    <form action="{% url 'accounts:password_reset_confirm' %}" method="post" class="space-y-4">
        <div>
            <label class="block text-xs font-bold text-neutral-700 uppercase mb-1">Registered Phone Number *</label>
            <input type="tel" name="phone" placeholder="+977 98XXXXXXXX" required class="w-full bg-surface-base border border-neutral-300 rounded-stall px-3 py-2 text-sm tabular-nums">
        </div>
        <button type="submit" class="w-full bg-brand-green text-white font-display font-bold py-3 rounded-stall hover:brightness-110 transition shadow">
            Send Reset Verification SMS
        </button>
    </form>
    <div class="border-t pt-4 text-center text-xs">
        <a href="{% url 'accounts:login' %}" class="text-brand-indigo font-semibold hover:underline">← Back to Login</a>
    </div>
</div>
{% endblock %}

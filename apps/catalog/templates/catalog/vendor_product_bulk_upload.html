{% extends "base.html" %}
{% block title %}Bulk CSV Upload [Phase 3] — Makwanpur Mart{% endblock %}

    <div class="p-8 border-2 border-dashed border-brand-green rounded-stall bg-surface-base">

{% endblock %}

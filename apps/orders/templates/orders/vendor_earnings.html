{% extends "base.html" %}
{% block title %}Vendor Financial Ledger [Phase 2] — Makwanpur Mart{% endblock %}
{% block content %}
<div class="space-y-6">
    <h1 class="font-display font-bold text-3xl text-brand-green">Transparent Financial Earnings [Phase 2]</h1>
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <div class="bg-white p-5 rounded-stall border shadow-sm">
            <span class="text-xs font-bold text-neutral-500">Gross Sales</span>
            <div class="font-display font-bold text-2xl text-surface-ink tabular-nums">NPR 100,000</div>
        </div>
        <div class="bg-white p-5 rounded-stall border shadow-sm">
            <span class="text-xs font-bold text-state-error">Platform Commission (5%)</span>
            <div class="font-display font-bold text-2xl text-state-error tabular-nums">- NPR 5,000</div>
        </div>
        <div class="bg-white p-5 rounded-stall border-2 border-brand-green shadow-sm">
            <span class="text-xs font-bold text-brand-green">Net Payout Due</span>
            <div class="font-display font-bold text-2xl text-brand-green tabular-nums">NPR 95,000</div>
        </div>
    </div>
</div>
{% endblock %}
